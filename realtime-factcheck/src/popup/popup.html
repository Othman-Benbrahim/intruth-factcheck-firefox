<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <link rel="stylesheet" href="popup.css"/>
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="logo">⬡</span>
      <span class="title">InTruth</span>
    </div>

    <div class="status" id="status">Inactive</div>
    <div class="runtime-error" id="runtimeError" style="display:none;"></div>

    <div class="keys-section" id="keysSection">

      <div class="key-field">
        <label class="key-label">Fournisseur LLM</label>
        <select class="key-input" id="llmProvider">
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="openai">Compatible OpenAI / LM Studio</option>
        </select>
      </div>

      <div class="key-field" id="presetField" style="display:none;">
        <label class="key-label">Fournisseur (préréglage)</label>
        <select class="key-input" id="llmPreset">
          <option value="custom">Personnalisé (saisie manuelle)</option>
          <option value="openrouter" data-url="https://openrouter.ai/api/v1" data-model="openai/gpt-4o-mini">OpenRouter — 290+ modèles</option>
          <option value="openai" data-url="https://api.openai.com/v1">OpenAI</option>
          <option value="gemini" data-url="https://generativelanguage.googleapis.com/v1beta/openai" data-model="gemini-2.5-flash">Google Gemini</option>
          <option value="groq" data-url="https://api.groq.com/openai/v1">Groq</option>
          <option value="mistral" data-url="https://api.mistral.ai/v1">Mistral</option>
          <option value="deepseek" data-url="https://api.deepseek.com">DeepSeek</option>
          <option value="xai" data-url="https://api.x.ai/v1">xAI (Grok)</option>
          <option value="together" data-url="https://api.together.xyz/v1">Together AI</option>
          <option value="fireworks" data-url="https://api.fireworks.ai/inference/v1">Fireworks AI</option>
          <option value="perplexity" data-url="https://api.perplexity.ai">Perplexity</option>
          <option value="lmstudio" data-url="http://localhost:1234/v1">LM Studio (local)</option>
          <option value="ollama" data-url="http://localhost:11434/v1">Ollama (local)</option>
        </select>
      </div>

      <div class="key-field" id="endpointField" style="display:none;">
        <label class="key-label">Endpoint (URL de base)</label>
        <input class="key-input" id="llmEndpoint" type="text" placeholder="http://localhost:1234/v1" autocomplete="off"/>
      </div>

      <div class="key-field">
        <label class="key-label" id="modelLabel">Modèle</label>
        <input class="key-input" id="llmModel" type="text" placeholder="claude-haiku-4-5-20251001" autocomplete="off"/>
      </div>

      <div class="key-field" id="reasoningField" style="display:none;">
        <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:11px;color:#bbb;">
          <input type="checkbox" id="llmReasoning" style="width:auto;margin:0;cursor:pointer;"/>
          Modèle « reasoning » (o-series, DeepSeek-R1…)
        </label>
        <div style="font-size:10px;color:#777;line-height:1.4;margin-top:3px;">
          Coche si le modèle « réfléchit » avant de répondre : on retire alors la température et on élargit le budget de tokens.
        </div>
      </div>

      <div class="key-field">
        <label class="key-label" id="apiKeyLabel">Clé API</label>
        <input class="key-input" id="llmApiKey" type="password" placeholder="sk-..." autocomplete="off"/>
      </div>

      <div class="key-field">
        <label class="key-label">Deepgram API Key</label>
        <input class="key-input" id="deepgramKey" type="password" placeholder="Clé API Deepgram..." autocomplete="off"/>
      </div>

      <div class="key-field">
        <label style="display:flex;align-items:center;gap:7px;cursor:pointer;font-size:11px;color:#bbb;">
          <input type="checkbox" id="rememberKeys" style="width:auto;margin:0;cursor:pointer;"/>
          Se souvenir de mes clés sur ce navigateur
        </label>
        <div style="font-size:10px;color:#777;line-height:1.4;margin-top:3px;">
          Décoché : les clés ne sont gardées que pour la session en cours (jamais écrites sur le disque).
        </div>
      </div>

      <div class="key-hint" id="keyHint"></div>
      <div class="validation-status" id="validationStatus">Validation non lancée.</div>
    </div>

    <button class="toggle-btn" id="toggleBtn">Start Fact-Checking</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
